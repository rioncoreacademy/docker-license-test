<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>License Admin</title>
<style>
  :root {
    --bg: #f5f6f8; --surface: #ffffff; --border: #dfe3e8; --ink: #1c2430;
    --muted: #6b7684; --accent: #2f6fed; --accent-ink: #ffffff;
    --ok: #1a7f4b; --ok-bg: #e6f6ee; --err: #b3261e; --err-bg: #fdecea;
    --warn: #8a5a00; --warn-bg: #fff4e0;
    --mono: ui-monospace, "SFMono-Regular", Consolas, monospace;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--ink);
    font-family: -apple-system, "Segoe UI", sans-serif; font-size: 14.5px;
    line-height: 1.55; padding: 32px 20px 80px;
  }
  .wrap { max-width: 640px; margin: 0 auto; }
  h1 { font-size: 20px; margin: 0 0 4px; }
  .sub { color: var(--muted); font-size: 13px; margin-bottom: 28px; }
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 22px 24px; margin-bottom: 20px;
  }
  .card h2 { font-size: 15px; margin: 0 0 16px; }
  label { display: block; font-size: 12.5px; color: var(--muted); margin: 12px 0 4px; }
  label:first-of-type { margin-top: 0; }
  input {
    width: 100%; padding: 9px 10px; border: 1px solid var(--border);
    border-radius: 6px; font-size: 14px; font-family: inherit; background: #fff;
  }
  input:focus { outline: 2px solid var(--accent); outline-offset: -1px; }
  .row { display: flex; gap: 12px; }
  .row > div { flex: 1; }
  button {
    margin-top: 16px; background: var(--accent); color: var(--accent-ink);
    border: none; border-radius: 6px; padding: 10px 18px; font-size: 14px;
    font-weight: 600; cursor: pointer;
  }
  button:hover { filter: brightness(1.08); }
  button:disabled { opacity: .5; cursor: default; }
  button.secondary { background: transparent; color: var(--accent); border: 1px solid var(--border); }
  button.danger { background: transparent; color: var(--err); border: 1px solid #f3c1bd; }
  button.small { margin: 0; padding: 6px 12px; font-size: 12.5px; }
  .btn-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 14px; }
  .result {
    margin-top: 18px; border-radius: 8px; padding: 16px 18px; font-size: 13.5px;
    display: none;
  }
  .result.show { display: block; }
  .result.ok { background: var(--ok-bg); border: 1px solid #b7e4cb; }
  .result.err { background: var(--err-bg); border: 1px solid #f3c1bd; color: var(--err); }
  .warn-box {
    background: var(--warn-bg); border: 1px solid #f0d999; color: var(--warn);
    border-radius: 8px; padding: 12px 14px; margin-bottom: 14px; font-size: 13px;
  }
  .warn-box ul { margin: 6px 0 0; padding-left: 18px; }
  .key-line {
    font-family: var(--mono); font-size: 17px; font-weight: 700;
    background: #fff; border: 1px solid var(--border); border-radius: 6px;
    padding: 10px 12px; margin: 8px 0 14px; display: flex; align-items: center;
    justify-content: space-between; gap: 10px;
  }
  .key-line button { margin: 0; padding: 5px 10px; font-size: 12px; }
  .instructions {
    background: #fff; border: 1px solid var(--border); border-radius: 6px;
    padding: 12px 14px; font-family: var(--mono); font-size: 12.5px;
    white-space: pre-wrap; word-break: break-all; color: var(--ink);
  }
  .cmd-line {
    display: flex; align-items: center; gap: 10px; margin: 8px 0 14px;
  }
  .cmd-line .instructions { flex: 1; margin: 0; }
  .cmd-line button { flex-shrink: 0; margin: 0; padding: 5px 10px; font-size: 12px; }
  .note { color: var(--muted); font-size: 12px; margin-top: 8px; }
  .field-error { color: var(--err); font-size: 12px; margin-top: 4px; }
  table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 12.5px; }
  th, td { text-align: left; padding: 6px 8px; border-bottom: 1px solid var(--border); }
  th { color: var(--muted); font-weight: 600; font-size: 11.5px; text-transform: uppercase; }
  h3.sec { font-size: 12.5px; text-transform: uppercase; letter-spacing: .03em; color: var(--muted); margin: 18px 0 4px; }
  .pill { display: inline-block; padding: 2px 9px; border-radius: 20px; font-size: 12px; font-weight: 600; }
  .pill.active { background: var(--ok-bg); color: var(--ok); }
  .pill.revoked, .pill.expired { background: var(--err-bg); color: var(--err); }
  .pill.matched { background: var(--warn-bg); color: var(--warn); font-size: 10.5px; margin-left: 6px; }
  .inline-form { display: none; margin-top: 12px; padding-top: 12px; border-top: 1px dashed var(--border); }
  .inline-form.show { display: block; }
  .folder-picker {
    max-height: 160px; overflow-y: auto; border: 1px solid var(--border);
    border-radius: 6px; padding: 8px 10px; background: #fff; font-size: 13px;
  }
  .folder-picker label {
    display: flex; align-items: center; gap: 6px; margin: 4px 0;
    font-size: 13px; color: var(--ink); font-weight: normal; cursor: pointer;
  }
  .folder-picker input[type="checkbox"] { width: auto; }
  #tokenGate { max-width: 360px; margin: 80px auto; text-align: center; }
  #tokenGate input { text-align: center; }
</style>
</head>
<body>

<div id="tokenGate" class="wrap">
  <div class="card">
    <h2>Admin token</h2>
    <input id="tokenInput" type="password" placeholder="Paste ADMIN_TOKEN">
    <div id="tokenError" class="field-error"></div>
    <button id="tokenSubmit" style="width:100%">Continue</button>
  </div>
</div>

<div id="app" class="wrap" style="display:none">
  <h1>License Admin</h1>
  <div class="sub">Generate and look up Tarang2p1 license keys. <a href="#" id="changeToken">Change token</a></div>

  <div class="card">
    <h2>Generate a license</h2>
    <label for="genEmail">Customer email</label>
    <input id="genEmail" type="email" placeholder="customer@example.com">

    <div class="row">
      <div>
        <label for="genExpires">Expires</label>
        <input id="genExpires" type="date">
      </div>
      <div>
        <label for="genSeats">Seats (machines)</label>
        <input id="genSeats" type="number" min="1" value="1">
      </div>
    </div>

    <label for="genFingerprint">Customer's machine fingerprint (optional)</label>
    <input id="genFingerprint" type="text" placeholder="64-character hash from Get-Fingerprint.ps1 -- checks for a repeat customer even under a new email">

    <label for="genProduct">Product (which folder this license unlocks)</label>
    <select id="genProduct">
      <option value="">Full access (legacy -- whole repo)</option>
    </select>
    <div class="note"><a href="#" id="toggleAddProduct">+ Add new product</a></div>

    <div id="addProductForm" class="inline-form">
      <label for="prodSlug">Slug (letters/numbers/-/_ only)</label>
      <input id="prodSlug" type="text" placeholder="verilog101">
      <label for="prodName">Name (optional)</label>
      <input id="prodName" type="text" placeholder="Verilog 101">
      <label>Folders (select one or more -- pulled live from tarang2p1-files)</label>
      <div id="prodFolders" class="folder-picker">Loading folders…</div>
      <label for="prodKey">Encryption key (the same one passed to encrypt_lab.sh for this folder)</label>
      <input id="prodKey" type="text" placeholder="AES passphrase for this folder's .v.enc files">
      <button type="button" class="small" id="prodSubmit">Create product</button>
      <div id="prodResult" class="result"></div>
    </div>

    <button id="genSubmit">Generate license</button>
    <div id="genResult" class="result"></div>
  </div>

  <div class="card">
    <h2>Look up a license</h2>
    <label for="lookupKey">License key</label>
    <input id="lookupKey" type="text" placeholder="TDP1-XXXX-XXXX-XXXX-XXXX">
    <button id="lookupSubmit" class="secondary">Look up</button>
    <div id="lookupResult" class="result"></div>
  </div>
</div>

<script>
const TOKEN_KEY = 'license_admin_token';

function apiOrigin() { return window.location.origin; }
function getToken() { return localStorage.getItem(TOKEN_KEY) || ''; }
function setToken(t) { localStorage.setItem(TOKEN_KEY, t); }
function clearToken() { localStorage.removeItem(TOKEN_KEY); }
function esc(s) { return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

async function api(path, { method = 'GET', body } = {}) {
  const res = await fetch(apiOrigin() + path, {
    method,
    headers: { 'Content-Type': 'application/json', 'X-Admin-Token': getToken() },
    body: body ? JSON.stringify(body) : undefined,
  });
  const data = await res.json().catch(() => ({ ok: false, error: 'bad_response' }));
  return { httpStatus: res.status, ...data };
}

function showGate() {
  document.getElementById('tokenGate').style.display = 'block';
  document.getElementById('app').style.display = 'none';
}
function showApp() {
  document.getElementById('tokenGate').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  loadProducts();
}

async function loadProducts(selectId) {
  const sel = document.getElementById('genProduct');
  const r = await api('/admin/products');
  if (!r.ok) return;
  sel.innerHTML = '<option value="">Full access (legacy -- whole repo)</option>'
    + r.products.map(p => `<option value="${p.id}">${esc(p.name || p.slug)} (${esc(p.folders.join(', '))})</option>`).join('');
  if (selectId) sel.value = String(selectId);
}

let repoFoldersLoaded = false;
async function loadRepoFolders() {
  const box = document.getElementById('prodFolders');
  const r = await api('/admin/repo-folders');
  if (!r.ok) {
    box.textContent = r.error === 'github_unreachable'
      ? 'Could not reach GitHub to list folders -- check your connection and try again.'
      : 'Could not load folders: ' + (r.error || 'unknown error');
    return;
  }
  if (r.folders.length === 0) {
    box.textContent = 'No folders found in tarang2p1-files.';
    return;
  }
  box.innerHTML = r.folders.map(f =>
    `<label><input type="checkbox" value="${esc(f)}"> ${esc(f)}</label>`
  ).join('');
  repoFoldersLoaded = true;
}

document.getElementById('toggleAddProduct').addEventListener('click', (e) => {
  e.preventDefault();
  document.getElementById('addProductForm').classList.toggle('show');
  if (!repoFoldersLoaded) loadRepoFolders();
});

document.getElementById('prodSubmit').addEventListener('click', async () => {
  const slug = document.getElementById('prodSlug').value.trim();
  const name = document.getElementById('prodName').value.trim();
  const folder_paths = Array.from(document.querySelectorAll('#prodFolders input[type="checkbox"]:checked')).map(cb => cb.value);
  const encryption_key = document.getElementById('prodKey').value.trim();
  const out = document.getElementById('prodResult');

  if (!slug || folder_paths.length === 0 || !encryption_key) {
    out.className = 'result err show';
    out.textContent = 'Slug, at least one folder, and an encryption key are all required.';
    return;
  }

  const r = await api('/admin/products', { method: 'POST', body: { slug, name, folder_paths, encryption_key } });
  if (r.httpStatus === 401) { clearToken(); showGate(); return; }

  if (!r.ok) {
    out.className = 'result err show';
    out.textContent = r.error === 'slug_or_folder_already_exists'
      ? 'A product with that slug already exists, or one of these folders already belongs to another product.'
      : r.error === 'invalid_slug'
      ? 'Slug must be lowercase letters, numbers, - or _ only.'
      : 'Could not create product: ' + (r.error || 'unknown error');
    return;
  }

  out.className = 'result ok show';
  out.textContent = `Product "${r.name || r.slug}" created (${r.folders.join(', ')}) and selected below.`;
  document.getElementById('prodSlug').value = '';
  document.getElementById('prodName').value = '';
  document.querySelectorAll('#prodFolders input[type="checkbox"]:checked').forEach(cb => cb.checked = false);
  document.getElementById('prodKey').value = '';
  await loadProducts(r.id);
});

async function verifyTokenAndEnter(token) {
  setToken(token);
  const r = await api('/admin/lookup?key=');
  if (r.httpStatus === 401) {
    clearToken();
    document.getElementById('tokenError').textContent = 'Incorrect token.';
    return false;
  }
  if (r.httpStatus === 403) {
    document.getElementById('tokenError').textContent = 'Admin page is disabled on the server (ADMIN_TOKEN not set).';
    return false;
  }
  return true;
}

document.getElementById('tokenSubmit').addEventListener('click', async () => {
  const token = document.getElementById('tokenInput').value.trim();
  if (!token) return;
  document.getElementById('tokenError').textContent = '';
  if (await verifyTokenAndEnter(token)) showApp();
});

document.getElementById('changeToken').addEventListener('click', (e) => {
  e.preventDefault();
  clearToken();
  showGate();
});

document.getElementById('genSubmit').addEventListener('click', async () => {
  const email = document.getElementById('genEmail').value.trim();
  const expires = document.getElementById('genExpires').value;
  const seats = document.getElementById('genSeats').value || '1';
  const fingerprint = document.getElementById('genFingerprint').value.trim();
  const productId = document.getElementById('genProduct').value;
  const btn = document.getElementById('genSubmit');
  const out = document.getElementById('genResult');

  if (!email || !expires) {
    out.className = 'result err show';
    out.textContent = 'Email and expiry date are required.';
    return;
  }

  btn.disabled = true;
  const body = { email, expires, seats };
  if (fingerprint) body.fingerprint = fingerprint;
  if (productId) body.product_id = productId;
  const r = await api('/admin/generate', { method: 'POST', body });
  btn.disabled = false;

  if (r.httpStatus === 401) { clearToken(); showGate(); return; }

  if (!r.ok) {
    out.className = 'result err show';
    out.textContent = r.error === 'malformed_fingerprint'
      ? 'That fingerprint doesn\'t look right (should be a 64-character hex string).'
      : 'Could not generate license: ' + (r.error || 'unknown error');
    return;
  }

  let warn = '';
  if (r.existing_licenses && r.existing_licenses.length > 0) {
    const items = r.existing_licenses.map(l => {
      const why = l.matched_by === 'fingerprint' ? 'same machine, different email'
                : l.matched_by === 'both' ? 'same email and same machine'
                : 'same email';
      return `<li><code>${esc(l.license_key)}</code> — ${esc(l.status)}, expires ${esc(l.expiry_date)} (${why})</li>`;
    }).join('');
    warn = `<div class="warn-box"><strong>Heads up:</strong> this customer/machine already has ${r.existing_licenses.length} license(s):
      <ul>${items}</ul>
      Consider extending one of those instead of tracking two.</div>`;
  }

  const runCmd = `Tarang2p1.exe start -licensekey ${r.license_key} -licenseapi ${apiOrigin()}`;
  const productLine = r.product
    ? `<div>
        Scoped to product <strong>${esc(r.product.name || r.product.slug)}</strong>
        (folders: ${r.product.folders.map(f => `<code>${esc(f)}</code>`).join(', ')}).
      </div>`
    : `<div>Full access (no product assigned — legacy/whole-repo license).</div>`;
  out.className = 'result ok show';
  out.innerHTML = `
    ${warn}
    <div>License created for <strong>${esc(r.customer_email)}</strong> — ${r.seats} seat(s), expires ${r.expiry_date}.</div>
    ${productLine}
    <div class="key-line"><span>${r.license_key}</span>
      <button type="button" class="small" onclick="navigator.clipboard.writeText('${r.license_key}')">Copy key</button>
    </div>
    <div>Send this to the customer along with <strong>Tarang2p1.exe</strong>. They run:</div>
    <div class="cmd-line">
      <div class="instructions">${runCmd}</div>
      <button type="button" class="small secondary" id="copyCmdBtn">Copy command</button>
    </div>
    <div class="note">This seat locks to whichever machine activates it first — sharing the key with a second
    person won't work once the seat is used. Local testing note: if Tarang2p1.exe is pulling an image on
    this same machine, use <code>http://host.docker.internal:${window.location.port || 80}</code> instead of
    ${apiOrigin()} for -licenseapi.</div>
  `;

  document.getElementById('copyCmdBtn').addEventListener('click', () => {
    navigator.clipboard.writeText(runCmd);
  });
});

async function runLookup(key) {
  const out = document.getElementById('lookupResult');
  const r = await api('/admin/lookup?key=' + encodeURIComponent(key));
  if (r.httpStatus === 401) { clearToken(); showGate(); return; }

  if (!r.ok) {
    out.className = 'result err show';
    out.textContent = r.error === 'license_not_found' ? 'No license found with that key.' : ('Error: ' + r.error);
    return;
  }

  const state = r.status !== 'active' ? 'revoked' : (r.expired ? 'expired' : 'active');
  const label = state === 'active' ? 'Active' : (state === 'expired' ? 'Expired' : 'Revoked');

  let actRows = r.activations.length
    ? r.activations.map(a => `<tr><td>${esc(a.fingerprint.slice(0, 12))}…</td><td>${esc(a.activated_at)}</td><td>${esc(a.last_seen_at)}</td></tr>`).join('')
    : '<tr><td colspan="3" style="color:var(--muted)">Not activated on any machine yet.</td></tr>';

  let relatedHtml = '';
  if (r.related_by_fingerprint.length > 0) {
    const items = r.related_by_fingerprint.map(l =>
      `<li><code>${esc(l.license_key)}</code> — ${esc(l.customer_email)}, ${esc(l.status)}, expires ${esc(l.expiry_date)}</li>`
    ).join('');
    relatedHtml = `<div class="warn-box"><strong>Same machine also holds:</strong><ul>${items}</ul></div>`;
  }

  let eventRows = r.events.length
    ? r.events.map(e => `<tr><td>${esc(e.event_type)}</td><td>${esc(e.detail)}</td><td>${esc(e.created_at)}</td></tr>`).join('')
    : '<tr><td colspan="3" style="color:var(--muted)">No events recorded.</td></tr>';

  const revokeBtn = state === 'revoked'
    ? `<button type="button" class="small secondary" data-action="reactivate">Reactivate</button>`
    : `<button type="button" class="small danger" data-action="revoke">Revoke</button>`;

  const productHtml = r.product
    ? `<div class="note">
        Product: <strong>${esc(r.product.name || r.product.slug)}</strong>
        (folders: ${r.product.folders.map(f => `<code>${esc(f)}</code>`).join(', ')})
      </div>`
    : `<div class="note">Product: full access (legacy/whole-repo license)</div>`;

  out.className = 'result ok show';
  out.innerHTML = `
    ${relatedHtml}
    <div><span class="pill ${state}">${label}</span> &nbsp; <strong>${esc(r.customer_email)}</strong></div>
    <div class="note">Expires ${r.expiry_date} &middot; ${r.activations_used} / ${r.max_activations} seat(s) used &middot; created ${r.created_at}</div>
    ${productHtml}

    <h3 class="sec">Activations</h3>
    <table><thead><tr><th>Fingerprint</th><th>Activated</th><th>Last seen</th></tr></thead><tbody>${actRows}</tbody></table>

    <h3 class="sec">History</h3>
    <table><thead><tr><th>Event</th><th>Detail</th><th>When</th></tr></thead><tbody>${eventRows}</tbody></table>

    <div class="btn-row">
      <button type="button" class="small secondary" data-action="extend">Extend</button>
      ${revokeBtn}
    </div>

    <div id="extendForm" class="inline-form">
      <label for="extendExpires">New expiry date</label>
      <input id="extendExpires" type="date" value="${r.expiry_date}">
      <label for="extendSeats">Seats (leave to keep current: ${r.max_activations})</label>
      <input id="extendSeats" type="number" min="1" placeholder="${r.max_activations}">
      <button type="button" class="small" id="extendConfirm">Confirm extend</button>
    </div>
  `;

  out.dataset.key = r.license_key;

  out.querySelector('[data-action="extend"]')?.addEventListener('click', () => {
    document.getElementById('extendForm').classList.toggle('show');
  });
  out.querySelector('#extendConfirm')?.addEventListener('click', async () => {
    const expires = document.getElementById('extendExpires').value;
    const seatsVal = document.getElementById('extendSeats').value;
    if (!expires) return;
    const body = { license_key: out.dataset.key, expires };
    if (seatsVal) body.seats = seatsVal;
    const er = await api('/admin/extend', { method: 'POST', body });
    if (er.httpStatus === 401) { clearToken(); showGate(); return; }
    if (er.ok) runLookup(out.dataset.key);
  });
  out.querySelector('[data-action="revoke"]')?.addEventListener('click', async () => {
    if (!confirm('Revoke this license? The customer will lose access on their next check-in.')) return;
    const rr = await api('/admin/revoke', { method: 'POST', body: { license_key: out.dataset.key } });
    if (rr.httpStatus === 401) { clearToken(); showGate(); return; }
    if (rr.ok) runLookup(out.dataset.key);
  });
  out.querySelector('[data-action="reactivate"]')?.addEventListener('click', async () => {
    const rr = await api('/admin/reactivate', { method: 'POST', body: { license_key: out.dataset.key } });
    if (rr.httpStatus === 401) { clearToken(); showGate(); return; }
    if (rr.ok) runLookup(out.dataset.key);
  });
}

document.getElementById('lookupSubmit').addEventListener('click', () => {
  const key = document.getElementById('lookupKey').value.trim();
  if (key) runLookup(key);
});

// Skip the gate if a token's already saved and still valid.
(async () => {
  if (getToken()) {
    const r = await api('/admin/lookup?key=');
    if (r.httpStatus !== 401) { showApp(); return; }
    clearToken();
  }
  showGate();
})();
</script>
</body>
</html>
